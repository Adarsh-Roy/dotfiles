# ─── Font ──────────────────────────────────────────────────────────────────────
font_family       Maple Mono NF
font_size         17.0
disable_ligatures never

# ─── Colors ────────────────────────────────────────────────────────────────────
foreground        #CBE0F0
background        #000000

cursor            #47FF9C
cursor_text_color #011423

selection_foreground #DCDFE4
selection_background #3A3F4B

# normal
color0  #282C34
color1  #E52E2E
color2  #44FFB1
color3  #FFE073
color4  #0FC5ED
color5  #A277FF
color6  #24EAF7
color7  #24EAF7

# bright
color8  #282C34
color9  #E52E2E
color10 #44FFB1
color11 #FFE073
color12 #A277FF
color13 #A277FF
color14 #24EAF7
color15 #24EAF7

# ─── Window: clean, transparent, borderless ───────────────────────────────────
background_opacity         0.80
background_blur            13
dynamic_background_opacity yes

hide_window_decorations    titlebar-only
window_padding_width       6
window_margin_width        0
window_border_width        0
draw_minimal_borders       yes
confirm_os_window_close    0

# macOS niceties
macos_titlebar_color       background
macos_quit_when_last_window_closed yes
macos_option_as_alt        no

# ─── Tab bar (minimal, matches wezterm vibe) ──────────────────────────────────
tab_bar_edge               top
tab_bar_style              powerline
tab_powerline_style        slanted
tab_bar_min_tabs           1
active_tab_foreground      #DCDFE4
active_tab_background      #282C34
active_tab_font_style      bold
inactive_tab_foreground    #666666
inactive_tab_background    #000000
tab_title_template         "{index} | {title}"

# ─── Cursor animation ─────────────────────────────────────────────────────────
cursor_shape                     block
cursor_blink_interval            0.5
cursor_stop_blinking_after       15.0

# Smooth animated cursor (kitty ≥ 0.38)
cursor_trail                     3
cursor_trail_decay               0.1 0.2
cursor_trail_start_threshold     0

# ─── Performance ──────────────────────────────────────────────────────────────
repaint_delay      8
input_delay        2
sync_to_monitor    yes

# ─── Bell ─────────────────────────────────────────────────────────────────────
enable_audio_bell  no
visual_bell_duration 0.0

# ─── Layouts (enable real splits) ─────────────────────────────────────────────
enabled_layouts splits,stack

# ─── Custom keymaps (additions / overrides only) ─────────────────────────────
# Kitty has a lot of good defaults already — see the cheat sheet I wrote in
# the response. Don't re-bind what's already sensible.

# --- Splits (kitty calls them "windows") ---
# Default cmd+enter creates a window using whatever direction the layout picks.
# These two force a specific split axis.
map cmd+d>\ launch --location=vsplit --cwd=current
map cmd+d>- launch --location=hsplit --cwd=current

# Vim-style focus movement (kitty's default is cmd+shift+arrows).
map cmd+d>h neighboring_window left
map cmd+d>j neighboring_window down
map cmd+d>k neighboring_window up
map cmd+d>l neighboring_window right

# --- Tabs ---
# Rename tab (kitty has no default for this).
map cmd+d>r set_tab_title

# --- Reload with visible feedback ---
# Overrides kitty's silent reload (cmd+ctrl+,) to fire a macOS notification.
map cmd+ctrl+, combine : load_config_file : launch --type=background osascript -e 'display notification "Config reloaded ✓" with title "kitty"'

# ─── Tab bar = your workspace bar ─────────────────────────────────────────────
# Show the OS-window count + active tab name on the right edge.
tab_bar_align          left
tab_bar_background     #000000
tab_bar_margin_height  0 0
tab_activity_symbol    "●"
bell_on_tab            "🔔 "
