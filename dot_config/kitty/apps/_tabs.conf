# Opt-in override: re-enable tabs for a specific TUI launcher.
# Chain after _app.conf in the launcher's --config list, e.g.:
#
#   --config "$HOME/.config/kitty/apps/_app.conf" \
#   --config "$HOME/.config/kitty/apps/_tabs.conf" \
#
# Later --config files override earlier ones, so this turns tabs back on
# for launchers that want them (e.g., a scratch terminal), while leaving
# _app.conf as the sensible default for single-purpose windows.

tab_bar_style    powerline
map cmd+t        new_tab
map cmd+shift+t  new_tab_with_cwd
