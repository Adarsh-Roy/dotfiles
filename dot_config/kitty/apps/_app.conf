# Shared overrides for standalone TUI-app Kitty windows.
# Each launcher script in this directory passes --config to load this file
# on top of the main kitty.conf.

# Inherit all of the main config first.
include ../kitty.conf

# ─── App-style window tweaks ──────────────────────────────────────────────────
# No tab bar in these windows — they're single-purpose, like native apps.
tab_bar_style hidden

# Disable tab-creation keybindings — these are not meant to be multi-tab windows.
map cmd+t        no_op
map cmd+shift+t  no_op
